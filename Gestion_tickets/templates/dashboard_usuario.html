{% extends "index.html" %}

{% block title %}Soporte{% endblock %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='dashboard_usuario.css') }}">

<div class="menu-container">

    <div class="dashboard-header">
        <h1>INBI</h1>
    </div>

    <div class="divider"></div>

    <h2 class="saludo" id="saludo">Bienvenido, {{ nombre }}</h2>

    <div class="menu-card">
        <a href="{{ url_for('crear_ticket') }}" class="menu-btn">📋 Generar Reporte</a>
        <a href="{{ url_for('status') }}" class="menu-btn">🔍 Estatus Reporte</a>
        <a href="{{ url_for('preguntas_frecuentes') }}" class="menu-btn">❓ Preguntas Frecuentes</a>
    </div>

</div>

<script>
    const nombre = "{{ nombre }}";
    const hora = new Date().getHours();
    let saludo = hora < 12 ? "Buen día" : hora < 19 ? "Buenas tardes" : "Buenas noches";
    document.getElementById("saludo").innerText = `${saludo}, ${nombre}`;
</script>

{% endblock %}

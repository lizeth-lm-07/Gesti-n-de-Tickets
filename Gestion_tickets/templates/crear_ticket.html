<link rel="stylesheet" href="{{ url_for('static', filename='crear_ticket.css') }}">

<form action="{{ url_for('crear_ticket') }}" method="post">

<div class="page">
    <div class="header">

        <h1>Crear ticket</h1>
    </div>

    <div class="card">

        <div class="form-group">
            <label>TÍTULO</label>
            <input type="text" name="titulo" placeholder="Ingresa el título de la situación" />
        </div>

        <div class="form-group">
            <label>DESCRIPCIÓN</label>
            <textarea name="descripcion" placeholder="Explica de manera clara y detallada la situación..."></textarea>
        </div>

        <div class="row">
            <div class="form-group">
                <label>CATEGORÍA</label>
                <select name="categoria">
                    <option>Infraestructura</option>
                    <option>Servicios</option>
                    <option>Docencia</option>
                </select>
            </div>

            <div class="form-group">
                <label>Prioridad</label>
                <select name="prioridad">
                    <option>Baja</option>
                    <option>Media</option>
                    <option>Alta</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>EVIDENCIA</label>
            <div class="upload-box">
                <p>📎</p>
                <p>Arrastra un archivo o <span>selecciona desde tu dispositivo</span></p>
                <small>PNG, JPG, PDF — máx. 10 MB</small>
                <input type="file" name="archivo">
            </div>
        </div>

        <div class="actions">
            <button type="button" class="btn cancel">Cancelar</button>
            <button type="submit" class="btn submit">Enviar ticket</button>
        </div>

    </div>
</div>

</form>

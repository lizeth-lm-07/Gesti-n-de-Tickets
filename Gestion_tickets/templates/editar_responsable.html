{% extends "index.html" %}

{% block title %}Editar Responsable - INBI{% endblock %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='responsables.css') }}">

<div class="resp-container">

    <div class="resp-header">
        <h1>Editar Responsable</h1>
        <div class="divider"></div>
    </div>

    <div class="form-card">
        <form method="POST" action="{{ url_for('editar_responsable', id_responsable=responsable[0]) }}" class="resp-form">

            <div class="form-row">
                <div class="form-group">
                    <label>Cargo</label>
                    <select name="cargo" required>
                        {% for cargo in cargos %}
                            <option value="{{ cargo }}" {% if cargo == responsable[1] %}selected{% endif %}>{{ cargo }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label>Departamento</label>
                    <select name="id_departamento" required>
                        {% for dep in departamentos %}
                            <option value="{{ dep[0] }}" {% if dep[0] == responsable[2] %}selected{% endif %}>{{ dep[1] }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Correo</label>
                    <input type="email" name="correo" value="{{ responsable[3] }}" required>
                </div>

                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="text" name="telefono" value="{{ responsable[4] }}" required>
                </div>
            </div>

            <div class="form-actions">
                <a href="{{ url_for('responsables') }}" class="btn-cancelar">Cancelar</a>
                <button type="submit" class="btn-agregar">Guardar cambios</button>
            </div>

        </form>
    </div>

</div>

{% endblock %}
